<div class="manage-panel">
  <h2>Manage Interview Q&A</h2>

  <!-- Notification -->
  <div *ngIf="notification" [ngClass]="notificationType" class="notification">
    {{ notification }}
  </div>

  <!-- Questions List -->
  <div *ngFor="let q of questions; let i = index; trackBy: trackByIndex" class="qa-card">
    <div class="qa-header">
      <h4>{{ q.question }}</h4>
      <p class="qa-meta">
        <strong>Category:</strong> {{ q.category }} | 
        <strong>SubCategory:</strong> {{ q.subCategory }}
      </p>
    </div>

    <!-- Action buttons -->
    <div class="qa-actions">
      <button class="btn-edit" (click)="editQuestion(i)">✏️ Edit</button>
      <button class="btn-delete" (click)="deleteQuestion(i)">🗑️ Delete</button>
    </div>
  </div>
</div>
