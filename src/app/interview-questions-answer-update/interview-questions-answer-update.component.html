<div class="manage-panel">
  <h2>Manage Interview Q&A</h2>

  <!-- Notification -->
  <div *ngIf="notification" [ngClass]="notificationType" class="notification">
    {{ notification }}
  </div>

  <!-- Questions List -->
  <div *ngFor="let q of questions; let i = index; trackBy: trackByIndex" class="qa-card">
    <div class="qa-header">
      <h4>{{ q.question }}</h4>
      <p class="qa-meta">
        <strong>Category:</strong> {{ q.category }} | 
        <strong>SubCategory:</strong> {{ q.subCategory }}
      </p>
    </div>

    <!-- Action buttons -->
    <div class="qa-actions">
      <button class="btn-edit" (click)="toggleEdit(i)">✏️ Edit</button>
      <button class="btn-delete" (click)="deleteQuestion(i)">🗑️ Delete</button>
    </div>

    <!-- Accordion-style edit form -->
    <div *ngIf="editingIndex === i" class="edit-form">
      <h3>Edit Interview Question</h3>

      <!-- Category -->
      <label>Category:</label>
      <select [(ngModel)]="editData.category">
        <option value="">Select Category</option>
        <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
      </select>
      <input *ngIf="editData.category === 'Other'" [(ngModel)]="editData.newCategory" placeholder="Enter new category" />

      <!-- SubCategory -->
      <label>SubCategory:</label>
      <select [(ngModel)]="editData.subCategory">
        <option value="">Select SubCategory</option>
        <option *ngFor="let s of subCategories" [value]="s">{{ s }}</option>
      </select>
      <input *ngIf="editData.subCategory === 'Other'" [(ngModel)]="editData.newSubCategory" placeholder="Enter new subcategory" />

      <!-- Question -->
      <label>Question:</label>
      <input [(ngModel)]="editData.question" />

      <!-- Answer Type -->
      <label>Answer Type:</label>
      <select [(ngModel)]="editData.answerType" (change)="onAnswerTypeChange()">
        <option value="text">Text</option>
        <option value="table">Table</option>
      </select>

      <!-- Text Answer -->
      <textarea *ngIf="editData.answerType === 'text'" [(ngModel)]="editData.answer"></textarea>

      <!-- Table Answer -->
      <div *ngIf="editData.answerType === 'table'">
        <table>
          <tr *ngFor="let row of editData.answer; let r = index; trackBy: trackByIndex">
            <ng-container *ngIf="r === 0; else bodyRow">
              <th *ngFor="let cell of row; let j = index; trackBy: trackByIndex">
                <input [(ngModel)]="editData.answer[r][j]" placeholder="Header {{j+1}}" />
              </th>
            </ng-container>
            <ng-template #bodyRow>
              <td *ngFor="let cell of row; let j = index; trackBy: trackByIndex">
                <input [(ngModel)]="editData.answer[r][j]" />
              </td>
            </ng-template>
          </tr>
        </table>
        <button (click)="addRow()">Add Row</button>
        <button (click)="addColumn()">Add Column</button>
        <button (click)="deleteRow()">Delete Row</button>
        <button (click)="deleteColumn()">Delete Column</button>
      </div>

      <!-- Actions -->
      <div class="edit-actions">
        <button class="btn-update" (click)="updateQuestion()">✅ Save</button>
        <button class="btn-cancel" (click)="cancelEdit()">❌ Cancel</button>
      </div>
    </div>
  </div>
</div>
