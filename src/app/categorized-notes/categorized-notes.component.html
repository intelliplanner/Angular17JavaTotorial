<section class="interview-round">
  <div class="java-notes">
    <div class="controls">
      <label for="notesSelect">Choose Java Notes: </label>
      <select id="notesSelect" [(ngModel)]="selected">
        <option *ngIf="!selected" value="" disabled>Select a file</option>

        <optgroup *ngIf="recentFiles.length" label="Recent">
          <option *ngFor="let f of recentFiles" [value]="f">{{ f }}</option>
        </optgroup>

        <!-- Category-wise groups -->
        <ng-container *ngFor="let category of categories">
          <optgroup [label]="category">
            <option *ngFor="let f of filesByCategory[category]" [value]="f">{{ f }}</option>
          </optgroup>
        </ng-container>
      </select>

      <button (click)="openSelected()" [disabled]="!selected">Open</button>
      <button (click)="openCategoryDialog()">Add Note by Category</button>

    </div>

    <div *ngIf="selectedFile" class="selected-file">
      Selected File: {{ selectedFile.name }}
    </div>

    <!-- Single unified viewer -->
    <div id="pdfViewer" class="pdf-viewer" *ngIf="currentUrl"></div>
  </div>
</section>


<!-- Dialog box -->
<div *ngIf="showDialog" class="dialog" (click)="closeDialog()" tabindex="0">
  <div class="dialog-content" (click)="$event.stopPropagation()">
    <h3>Add New Category</h3>

    <div *ngIf="selectedFile" class="selected-file">
      Selected File: {{ selectedFile.name }}
    </div>

    <label for="categorySelect">Choose Existing Category:</label>
    <select id="categorySelect" [(ngModel)]="selectedCategory">
      <option value="" disabled>Select category</option>
      <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
    </select>

    <div *ngIf="!selectedCategory">
      <label for="categoryName">Or Enter New Category:</label>
      <input id="categoryName" [(ngModel)]="newCategory" placeholder="Enter category name" />
    </div>

    <p class="preview" *ngIf="selectedCategory || newCategory">
      Selected Category: <strong>{{ selectedCategory || newCategory }}</strong>
    </p>

    <input type="file" accept="application/pdf" (change)="onFileSelected($event)" #fileInput style="display:none" />
    <button (click)="fileInput.click()">Select PDF</button>
    <button (click)="savePdf()" [disabled]="!selectedFile">Save PDF</button>

    <div class="dialog-actions">
      <button (click)="savePdf()">Save Category</button>
      <button (click)="closeDialog()">Cancel</button>
    </div>
  </div>
</div>
