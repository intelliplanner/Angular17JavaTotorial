<div class="app-layout d-flex">
  <!-- Sidebar -->
  <div class="vertical-nav bg-light p-2">
    <ul class="nav flex-column">
      <li class="nav-item" *ngFor="let item of uniqueCategories">
        <a class="nav-link" (click)="showFiles(item.routeMap)">
          {{ item.notesCategory }}
        </a>
      </li>
    </ul>
  </div>

  <!-- Content Area -->
  <div class="content-area flex-grow-1 p-3">
    <div *ngIf="selectedFiles.length" class="d-flex align-items-center gap-2">
      <label for="fileSelect" class="me-2">Files in this category:</label>

      <select id="fileSelect" class="form-select w-auto"
              [(ngModel)]="selectedFile">
              <!-- (change)="onFileChange()"> -->
        <option *ngFor="let f of selectedFiles" [value]="f">{{ f }}</option>
      </select>

      <!-- Open button optional now -->
      <button class="btn btn-primary" (click)="openSelected()" [disabled]="!selectedFile">
        Open
      </button>
    </div>

    <!-- PDF Viewer -->
    <div *ngIf="currentUrl" class="pdf-viewer mt-3">
      <iframe [src]="currentUrl" width="100%" height="800" frameborder="0"></iframe>
    </div>
  </div>
</div>
