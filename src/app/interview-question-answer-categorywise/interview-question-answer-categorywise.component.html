<div class="app-layout d-flex">
    <!-- Sidebar -->
    <div class="vertical-nav bg-light p-2">
        <ul class="nav flex-column">
            <li class="nav-item" *ngFor="let cat of categories">
                <a class="nav-link" (click)="showCategory(cat)">
                    {{ cat }}
                </a>
            </li>
        </ul>
    </div>

    <!-- Content Area -->
    <div class="content-area flex-grow-1 p-3">
        <!-- Fixed header row -->
        <div class="category-header d-flex align-items-center gap-3">
            <h3 *ngIf="selectedCategory" class="mb-0"> {{ selectedCategory }}</h3>

            <div *ngIf="subCategories.length">
                <select id="subSelect" class="form-select w-auto" [(ngModel)]="selectedSubCategory"
                    (change)="filterBySubCategory()">
                    <option value="">All</option>
                    <option *ngFor="let s of subCategories" [value]="s">{{ s }}</option>
                </select>
            </div>
        </div>

        <!-- Questions & Answers -->
        <div *ngFor="let q of filteredQuestions; trackBy: trackByIndex" class="qa-card">
            <h4>
                {{ q.question }}{{ q.question.endsWith('?') ? '' : '?' }}
            </h4>

            <!-- Text Answer -->
            <div *ngIf="q.answerType === 'text'">
                <!-- If subCategory is Program, show inside codewrapper -->
                <div *ngIf="q.subCategory === 'Program'; else normalAnswer" class="codewrapper">
                    <div class="codeblock">
                        <pre>{{ q.answer }}</pre>
                    </div>
                    <a class="btn btn-compile" href="https://www.tpointtech.com/compiler/java" target="_blank">
                        Compile and Run Java
                    </a>
                </div>

                <!-- Normal text answers -->
                <ng-template #normalAnswer>
                    <div class="text-answer">
                        <div *ngFor="let line of q.answer.split('\n')" class="answer-line">
                            {{ line.trim() }}
                        </div>
                    </div>
                </ng-template>
            </div>

            <!-- Table Answer -->
            <table *ngIf="q.answerType === 'table'" class="table-answer">
                <tr *ngFor="let row of q.answer; let r = index; trackBy: trackByIndex">
                    <ng-container *ngIf="r === 0; else bodyRow">
                        <th *ngFor="let cell of row; trackBy: trackByIndex">{{ cell }}</th>
                    </ng-container>
                    <ng-template #bodyRow>
                        <td *ngFor="let cell of row; trackBy: trackByIndex">{{ cell }}</td>
                    </ng-template>
                </tr>
            </table>
        </div>
    </div>
</div>
