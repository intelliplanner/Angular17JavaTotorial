<div class="admin-panel">
  <h2>Edit Interview Question</h2>

  <!-- Category -->
  <label>Category:</label>
  <select [(ngModel)]="selectedCategory">
    <option value="">Select Category</option>
    <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
  </select>
  <input *ngIf="selectedCategory === 'Other'" [(ngModel)]="newCategory" placeholder="Enter new category" />

  <!-- SubCategory -->
  <label>SubCategory:</label>
  <select [(ngModel)]="selectedSubCategory">
    <option value="">Select SubCategory</option>
    <option *ngFor="let s of subCategories" [value]="s">{{ s }}</option>
  </select>
  <input *ngIf="selectedSubCategory === 'Other'" [(ngModel)]="newSubCategory" placeholder="Enter new subcategory" />

  <!-- Question -->
  <label>Question:</label>
  <input [(ngModel)]="data.newQuestion.question" />

  <!-- Answer Type -->
  <label>Answer Type:</label>
  <select [(ngModel)]="data.newQuestion.answerType" (change)="onAnswerTypeChange()">
    <option value="text">Text</option>
    <option value="table">Table</option>
  </select>

  <!-- Text Answer -->
  <textarea *ngIf="data.newQuestion.answerType === 'text'" [(ngModel)]="data.newQuestion.answer"></textarea>

  <!-- Table Answer -->
  <div *ngIf="data.newQuestion.answerType === 'table'">
    <table>
      <tr *ngFor="let row of data.newQuestion.answer; let r = index; trackBy: trackByIndex">
        <ng-container *ngIf="r === 0; else bodyRow">
          <th *ngFor="let cell of row; let j = index; trackBy: trackByIndex">
            <input [(ngModel)]="data.newQuestion.answer[r][j]" placeholder="Header {{j+1}}" />
          </th>
        </ng-container>
        <ng-template #bodyRow>
          <td *ngFor="let cell of row; let j = index; trackBy: trackByIndex">
            <input [(ngModel)]="data.newQuestion.answer[r][j]" />
          </td>
        </ng-template>
      </tr>
    </table>
    <button (click)="addRow()">Add Row</button>
    <button (click)="addColumn()">Add Column</button>
    <button (click)="deleteRow()">Delete Row</button>
    <button (click)="deleteColumn()">Delete Column</button>
  </div>

  <!-- Actions -->
  <button (click)="onSave()">Save</button>
  <button (click)="onCancel()">Cancel</button>
</div>
